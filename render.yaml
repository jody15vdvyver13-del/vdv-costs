databases:
  - name: vdv-db
    plan: free
    databaseName: vdv
    user: vdv

services:
  - type: web
    name: vdv-costs
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vdv-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TEAMS
        value: "Team A,Team B,Team C,Management"
