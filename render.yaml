databases:
  - name: vdv-db
    plan: free
    databaseName: vdv
    user: vdv

services:
  - type: web
    name: vdv-costs
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vdv-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: MANAGEMENT_WHATSAPP_NUMBERS
        sync: false
      - key: CFO_WHATSAPP_NUMBER
        sync: false
      - key: TEAMS
        value: "Team A,Team B,Team C,Management"
